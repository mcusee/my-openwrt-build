name: LEDE Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 拉取你自己的仓库（包含 build-diy.sh）
      - name: Checkout
        uses: actions/checkout@v4

      # 安装依赖
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib \
          g++-multilib gettext genisoimage git gperf haveged help2man intltool \
          libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build \
          p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      # 克隆 LEDE
      - name: Clone LEDE
        run: |
          git clone https://github.com/coolsnowwolf/lede.git lede

      # 缓存 dl
      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: ${{ runner.os }}-lede-dl

      # 执行 DIY 脚本
      - name: Run DIY Script
        run: |
          cd lede
          chmod +x ../build-diy.sh
          ../build-diy.sh

      # 获取日期 + 内核版本
      - name: Get Build Info
        run: |
          echo "DATE=$(TZ=Asia/Shanghai date +%Y%m%d)" >> $GITHUB_ENV
          echo "KERNEL=$(grep KERNEL_PATCHVER lede/target/linux/x86/Makefile | awk -F= '{print $2}')" >> $GITHUB_ENV

      # 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATE }}-openwrt-x86-k${{ env.KERNEL }}-firmware
          path: lede/bin/targets/x86/64/

      # 上传 packages
      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATE }}-openwrt-x86-k${{ env.KERNEL }}-packages
          path: lede/bin/packages/x86_64/
          
      # 发布 Release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DATE }}-OpenWrt-k${{ env.KERNEL }}-Firmware
          name: ${{ env.DATE }}-OpenWrt-k${{ env.KERNEL }}-Firmware
          files: |
            lede/bin/targets/x86/64/*.img*
            lede/bin/targets/x86/64/*.vmdk
            lede/bin/targets/x86/64/*.qcow2
            lede/bin/targets/x86/64/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发送 Telegram 通知
      - name: Send Telegram Notification
        run: |
          MESSAGE="✅ OpenWrt 编译完成

          📅 版本: ${{ env.DATE }}
          🧠 Kernel: ${{ env.KERNEL }}

          🔗 下载:
          https://github.com/${{ github.repository }}/releases"

          curl -s "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="$MESSAGE"